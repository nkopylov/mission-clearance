# Mission Clearance — Default Configuration
#
# This file contains sensible defaults for all subsystems.
# Override individual values via environment variables or a local config file.

[kernel]
max_delegation_depth = 10
default_mission_timeout = "2h"
fail_closed = true

[vault]
path = "~/.mission-clearance/vault.db"
master_key_source = "passphrase"

[api]
listen = "127.0.0.1:9090"

[adapters.http]
listen = "127.0.0.1:8080"
tls_inspection = true
ca_cert_path = "~/.mission-clearance/ca.pem"

[adapters.db]
listen = "127.0.0.1:5433"
upstream_protocol = "postgres"

[adapters.shell]
sandbox = "none"

[adapters.tool_call]
mode = "wrapper"

[policy_pipeline]
# The deterministic layer runs in-process.  When it returns "Escalate",
# the integration layer (e.g. Claude Code hook) asks the host LLM to
# judge the operation — no separate API key or HTTP call is needed.
layers = ["deterministic"]

[trace]
path = "~/.mission-clearance/trace.db"
chain_integrity = true
graph_export_format = "dot"

[operation_policies]
include = ["defaults"]

[identity]
# Identity providers to try in order.
providers = ["oidc", "api_key", "mission_token"]
# Whether anonymous (identity-free) access is allowed.
# Set to false in production to require identity for all operations.
allow_anonymous = true

[identity.oidc]
# issuer = "https://accounts.google.com"
# client_id = "mission-clearance"
# jwks_uri = "https://accounts.google.com/.well-known/jwks.json"
# email_claim = "email"
# group_claim = "groups"

[graph]
path = "~/.mission-clearance/graph.db"
delegation_policies = "default-delegation-policies.toml"
chain_evaluation_prompt = "chain_evaluation_prompt.txt"
